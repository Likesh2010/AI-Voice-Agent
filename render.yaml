services:
  # FastAPI Web Service
  - type: web
    name: speaking-agent-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: speaking-agent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: speaking-agent-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: WEBHOOK_SHARED_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production

  # Redis Cache & Rate Limiting
  - type: redis
    name: speaking-agent-redis
    ipAllowList: [] # internal access only

databases:
  # PostgreSQL Database
  - name: speaking-agent-db
    plan: free
